name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm install

      - name: Run checks
        run: |
          set -euo pipefail
          node --check main.js
          node tests/test_proxy_config.js
          bash tests/test_workflow_config_sources.sh
